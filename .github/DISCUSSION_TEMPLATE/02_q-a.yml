title: "[Q&A] "
body:
  - type: markdown
    attributes:
      value: |
        開発や実装業務に関することはもちろん、それ以外の相談も投稿できるカテゴリです。
        同じ疑問を持つ人が後から参照できるように、背景や試したことも残してください。
  - type: textarea
    id: question
    attributes:
      label: 質問・相談内容
      description: 何に困っているか、何を知りたいかを書いてください。
      placeholder: 発生している問題や、相談したい内容
    validations:
      required: true
  - type: textarea
    id: background
    attributes:
      label: 背景
      description: 前提条件や経緯があれば書いてください。
      placeholder: 対象機能、利用環境、関連する業務背景など
  - type: textarea
    id: tried
    attributes:
      label: 試したこと
      description: すでに確認した内容や試行した内容があれば書いてください。
      placeholder: 調査済みの資料、試した手順、確認したログなど
  - type: textarea
    id: references
    attributes:
      label: 関連リンク
      description: Slack のやり取りや参考リンクがあれば添付してください。
      placeholder: Slack スレッド、ドキュメント、チケットなど
