body:
  - type: markdown
    attributes:
      value: |
        業務や技術の知識、Tips、手順、解決方法などを共有します。
        読んだ人が再現できるように、結論と手順を明確に書いてください。
  - type: textarea
    id: conclusion
    attributes:
      label: 結論・要点
      description: まず最初に、何が分かったのかを簡潔に書いてください。
      placeholder: "例: ○○ の設定を変更することで解決した"
      value: |
        ## 背景
        - 

        ## やりたいこと
        -

               
    validations:
      required: true
  - type: textarea
    id: references
    attributes:
      label: 参考リンク
      description: 参考にしたサイト、文書、書籍などがあれば記載してください。
